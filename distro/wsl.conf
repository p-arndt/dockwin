# /etc/wsl.conf for the dedicated "dockwin" WSL2 distro.
#
# This file is placed at /etc/wsl.conf INSIDE the distro by
# scripts/Install-Dockwin.ps1. It configures the engine host the way the
# dockwin architecture requires:
#
#   * systemd as PID 1  -> gives dockerd `systemctl enable docker` with
#                          Restart=on-failure + dependency ordering (the
#                          robust, chosen autostart method).
#   * interop / appendWindowsPath disabled -> this is an isolated engine
#                          box, not a dev shell; keep the Windows PATH and
#                          .exe interop out of it to reduce surprises.
#
# NOTE on autostart: the PRIMARY mechanism is systemd (`systemctl enable
# docker`, configured by provision-inside.sh). The [boot] command= line
# below is the documented FALLBACK for a non-systemd base image; it is a
# no-op harmless safety net when systemd is active because `service docker
# start` simply hands off to systemd. Keep it so the distro still
# autostarts dockerd if systemd PID1 ever fails to come up.

[boot]
systemd=true
# Fallback autostart for non-systemd bases (no-op under systemd):
command="service docker start || true"

[interop]
enabled=false
appendWindowsPath=false

[network]
generateHosts=true
generateResolvConf=true

[user]
default=root
