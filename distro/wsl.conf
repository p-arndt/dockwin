# /etc/wsl.conf for the dedicated "dockwin" WSL2 distro.
#
# This file is placed at /etc/wsl.conf INSIDE the distro by
# scripts/Install-Dockwin.ps1. It configures the engine host the way the
# dockwin architecture requires:
#
#   * systemd as PID 1  -> gives dockerd `systemctl enable docker` with
#                          Restart=on-failure + dependency ordering (the
#                          robust, chosen autostart method).
#   * interop / appendWindowsPath disabled -> this is an isolated engine
#                          box, not a dev shell; keep the Windows PATH and
#                          .exe interop out of it to reduce surprises.
#
# NOTE on autostart: the PRIMARY mechanism is systemd (`systemctl enable
# docker`, configured by provision-inside.sh). The [boot] command= line
# below is the FALLBACK for a non-systemd base image. It MUST do nothing under
# systemd: `service docker start` does NOT transparently hand off to systemd
# here -- docker-ce ships an /etc/init.d/docker sysv script that `service` runs
# directly, launching a bare `dockerd -p /var/run/docker.pid` that then holds
# the pidfile and blocks systemd's docker.service from starting ("process with
# PID N is still running"). So only run it when systemd is genuinely absent.
#
# THE RACE (proven): WSL runs [boot] command= very early -- BEFORE systemd has
# claimed PID 1. So any "is systemd up?" check of the CURRENT state at that
# instant (`[ -d /run/systemd/system ]`, `grep systemd /proc/1/comm`, etc.)
# fails open, `service docker start` fires, and the bare sysv dockerd wedges
# docker.service for the whole boot (the engine then "takes 60s" = the app
# waiting out its reachability timeout on a daemon that will never come up).
#
# THE FIX: don't sample the current state -- WAIT for systemd to appear (up to
# 30s), then only start the sysv daemon if it never does. On a systemd box the
# dir shows up in ~1-2s, the loop breaks, and the `||` skips `service docker
# start` entirely. On a true non-systemd base the loop times out and the sysv
# fallback runs as intended.

[boot]
systemd=true
# Race-proof fallback: wait for systemd, then start sysv docker ONLY if systemd
# never appeared. See the long note above for why sampling state here is unsafe.
command=i=0; while [ $i -lt 30 ] && [ ! -d /run/systemd/system ]; do i=$((i+1)); sleep 1; done; [ -d /run/systemd/system ] || service docker start || true

[interop]
enabled=false
appendWindowsPath=false

[network]
generateHosts=true
generateResolvConf=true

[user]
default=root
