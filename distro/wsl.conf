# /etc/wsl.conf for the dedicated "dockwin" WSL2 distro.
#
# NON-systemd model (like Docker Desktop): the distro's own /init stays PID 1 and
# dockerd is started + kept alive by the supervisor below, launched from
# [boot] command=. This deliberately avoids systemd=true, which required a
# terminate + systemd cold-boot that RACED WSL on locked-down machines (the distro
# showing "Running" but every exec failing Wsl/Service/E_UNEXPECTED, or hanging).
# No systemd => no cold-boot => no race. Autostart/Restart-on-failure that systemd
# used to give us are provided by /usr/local/sbin/dockwin-supervise.sh instead.

[boot]
command=/usr/local/sbin/dockwin-supervise.sh

[interop]
enabled=false
appendWindowsPath=false

[network]
generateHosts=true
generateResolvConf=true

[user]
default=root
