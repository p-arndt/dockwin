# /etc/wsl.conf for the dedicated "dockwin" WSL2 distro.
#
# This file is placed at /etc/wsl.conf INSIDE the distro by
# scripts/Install-Dockwin.ps1. It configures the engine host the way the
# dockwin architecture requires:
#
#   * systemd as PID 1  -> gives dockerd `systemctl enable docker` with
#                          Restart=on-failure + dependency ordering (the
#                          robust, chosen autostart method).
#   * interop / appendWindowsPath disabled -> this is an isolated engine
#                          box, not a dev shell; keep the Windows PATH and
#                          .exe interop out of it to reduce surprises.
#
# NOTE on autostart: the PRIMARY mechanism is systemd (`systemctl enable
# docker`, configured by provision-inside.sh). The [boot] command= line
# below is the FALLBACK for a non-systemd base image. It MUST be guarded so
# it does nothing under systemd: `service docker start` does NOT transparently
# hand off to systemd here -- docker-ce ships an /etc/init.d/docker sysv script
# that `service` runs directly, launching a bare `dockerd -p /var/run/docker.pid`
# that then holds the pidfile and blocks systemd's docker.service from starting
# ("process with PID N is still running"). So only run it when systemd is absent.

[boot]
systemd=true
# Fallback autostart for non-systemd bases. The `[ -d /run/systemd/system ]`
# guard makes this a true no-op when systemd is PID 1 (the normal case), so it
# can't race systemd's docker.service.
command="[ -d /run/systemd/system ] || service docker start || true"

[interop]
enabled=false
appendWindowsPath=false

[network]
generateHosts=true
generateResolvConf=true

[user]
default=root
